<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/static/css/style.css">
    <title>Sistema de Tarefas</title>
</head>
<body>
    <h1>Sistema de Tarefas</h1>
    <div id="task-container">
        <div>
            <input type="text" id="nome" placeholder="Nome da tarefa" required>
            <input type="number" id="custo" placeholder="Custo" required>
            <input type="date" id="data_limite" required>
            <button id="saveTaskButton">Salvar Tarefa</button>
        </div>
        
        <h2>Listagem das Tarefas</h2>
        <table id="taskTable">
            <thead>
                <tr>
                    <th>Nome</th>
                    <th>Custo</th>
                    <th>Data Limite</th>
                </tr>
            </thead>
            <tbody id="taskList">
                <!-- As tarefas serão inseridas aqui dinamicamente -->
            </tbody>
        </table>
        
        <div class="button-container">
            <button id="editTaskButton">Editar Tarefa</button>
            <button id="deleteTaskButton">Deletar Tarefa</button>
        </div>
    </div>

    <!-- Popup para edição de tarefa -->
    <div class="popup" id="editPopup">
        <div class="popup-content">
            <span class="close" id="closePopupButton">&times;</span>
            <h2>Editar Tarefa</h2>
            <label for="editNome">Nome da Tarefa:</label>
            <input type="text" id="editNome" required>
            <label for="editCusto">Custo:</label>
            <input type="number" id="editCusto" required>
            <label for="editDataLimite">Data Limite:</label>
            <input type="date" id="editDataLimite" required>
            <button id="updateTaskButton">Atualizar Tarefa</button>
        </div>
    </div>

    <script src="/static/js/script.js"></script>
</body>
</html>
